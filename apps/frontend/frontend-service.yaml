# ONE service fronting BOTH versions. The selector matches
# 'app: frontend' only — not version. Istio's DestinationRule
# splits traffic between them by the version label.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mesh-demo
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080